name: CI

# Per-ref concurrency: a new push to a PR cancels its previous run; main pushes
# don't cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  # Run on every non-main branch push so feature branches get CI without
  # needing an open PR. Main pushes are covered by the PR that landed them
  # plus the separate cache-warm workflow.
  push:
    branches-ignore: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "cli/**"
      - "mcp/**"
      - "app/**"
  # Triggers for both same-repo and fork PRs targeting main. Fork PRs run
  # with a read-only GITHUB_TOKEN; `swatinem/rust-cache` will read but not
  # save the cache (GitHub restricts cache writes from forks).
  pull_request:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "cli/**"
      - "mcp/**"
      - "app/**"
  workflow_dispatch:

jobs:
  test:
    # Dedup internal-PR runs: a push to a same-repo branch with an open PR
    # triggers BOTH push and pull_request events. We let `push` handle
    # same-repo branches and only run `pull_request` for forks (whose pushes
    # don't reach the upstream repo).
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Test-only cache — separate slot so PRs don't fight the release cache
      # populated by .github/workflows/cache-warm.yml and consumed by release.yml.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: cache-test-${{ matrix.platform }}
          cache-on-failure: true

      - name: Test workspace
        run: cargo test --workspace --locked
